[project]
name = "finality-connect"
authors = ["Finality Labs"]
description = "A decentralized protocol for token licensing and cross-chain verification"
telemetry = false
requirements = []
[contracts.finality-core]
path = "contracts/finality-core.clar"
depends_on = []

[contracts.finality-licensing]
path = "contracts/finality-licensing.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
